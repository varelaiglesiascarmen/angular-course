<h1>Dragonball Page</h1>
<hr />

<section class="row">

  <div class="col-12 col-sm-6">

    <h3>Agregar:  {{ name() }}</h3>

    <input
      type="text"
      class="form-control"
      placeholder="Nombre"
      [value]="name()"
      (input)="name.set(txtName.value)"
      #txtName
    /> <!-- [value]="name()" > will print the name of the signal declared in the ts -->

    <input
      type="number"
      class="form-control mt-2"
      placeholder="Poder"
      [value]="power()"
      (input)="power.set(txtPower.valueAsNumber)"
      #txtPower
    />

    <button (click)="addCharacter()" class="mt-2 btn btn-primary">Agregar</button>
  </div>

  <div class="col-12 col-sm-6">

    <h3>Personajes fuertes:</h3>

    <ul>
      @for (character of characters(); track character.id; let idx = $index) {

      @if (character.power > 500){
      <li>
        <!-- +1 > the arrays always start at 0, if you want to display in 1 you must add 1 -->
        <span>{{ idx + 1 }} - {{ character.name }}</span>
        <strong [class.text-danger]="character.power > 9000" [class.text-primary]="character.power <= 9000">
          <!-- [ngClass]="powerClasses()" -->
          ({{ character.power }})</strong>
      </li>} @else {
        <li><strong>Aquí no hay nada</strong></li>
      }
      }
    </ul>

  </div>

</section>
