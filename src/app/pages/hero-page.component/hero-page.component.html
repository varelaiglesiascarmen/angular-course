<div class="container">
  <h1>{{ name() }}</h1>

  <dl>
    <dt>Nombre:</dt>
    <dd>{{ name() }}</dd>

    <dt>Edad:</dt>
    <dd>{{ age() }}</dd>

    <dt>Método:</dt>
    <dd>{{ getHeroDescription() }}</dd>

    <dt>Capitalizado:</dt>
    <dd>{{ name().toUpperCase() }}</dd>
  </dl>

  <button (click)="changeHero()">Cambiar nombre</button>
  <button (click)="changeAge()">Cambiar edad</button>
  <button (click)="resetForm()">Reset</button>
</div>
